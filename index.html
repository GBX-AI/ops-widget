<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Ops Widget — Deploys & Azure</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>📡</text></svg>">
<style>
:root{
  color-scheme: light;
  --surface:#fcfcfb; --plane:#f9f9f7;
  --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --accent:#2a78d6; --accent-soft:#cde2fb;
  --shadow:0 1px 2px rgba(11,11,11,.05),0 4px 16px rgba(11,11,11,.05);
  --r:14px;
}
@media (prefers-color-scheme:dark){
  :root:where(:not([data-theme=light])){
    color-scheme: dark;
    --surface:#1a1a19; --plane:#0d0d0d;
    --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
    --accent:#3987e5; --accent-soft:#184f95;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  }
}
:root[data-theme=dark]{
  color-scheme: dark;
  --surface:#1a1a19; --plane:#0d0d0d;
  --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
  --accent:#3987e5; --accent-soft:#184f95;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--plane); color:var(--ink);
  font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
  padding:0 0 env(safe-area-inset-bottom);
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
button{font:inherit;color:inherit}
a{color:var(--accent)}

/* ---------- shell ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:14px}
header.top{
  position:sticky;top:0;z-index:30;background:var(--plane);
  border-bottom:1px solid var(--ring);
  padding:10px 0 9px;margin-bottom:14px;
}
.top-in{max-width:1180px;margin:0 auto;padding:0 14px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--good);flex:none;
  box-shadow:0 0 0 4px color-mix(in srgb,var(--good) 18%,transparent)}
.brand h1{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spacer{flex:1}
.iconbtn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-width:38px;height:38px;padding:0 11px;border-radius:10px;
  background:var(--surface);border:1px solid var(--ring);cursor:pointer;
  font-size:13px;font-weight:550;transition:background .15s,transform .1s;
}
.iconbtn:hover{background:color-mix(in srgb,var(--ink) 5%,var(--surface))}
.iconbtn:active{transform:scale(.97)}
.iconbtn svg{width:17px;height:17px;flex:none}
.iconbtn.primary{background:var(--accent);border-color:transparent;color:#fff}
.iconbtn.primary:hover{background:color-mix(in srgb,#000 10%,var(--accent))}
.iconbtn[disabled]{opacity:.5;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin 1s linear infinite}

/* ---------- cards ---------- */
.card{background:var(--surface);border:1px solid var(--ring);border-radius:var(--r);box-shadow:var(--shadow)}
.sec{margin-bottom:20px}
.sec-head{display:flex;align-items:center;gap:9px;margin:0 2px 10px;flex-wrap:wrap}
.sec-head h2{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:650}
.sec-head .meta{font-size:12px;color:var(--muted);margin-left:auto}

.grid{display:grid;gap:12px}
.g-repos{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.g-stats{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.g-two{grid-template-columns:1.25fr 1fr}
@media(max-width:820px){.g-two{grid-template-columns:1fr}}

/* ---------- repo card ---------- */
.repo{padding:13px 14px}
.repo-h{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.repo-h .nm{font-weight:650;font-size:14.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.repo-h .own{color:var(--muted);font-weight:450}
.wf{padding:9px 0;border-top:1px solid var(--grid)}
.wf:first-of-type{border-top:0;padding-top:8px}
.wf-top{display:flex;align-items:center;gap:8px}
.wf-nm{font-size:13.5px;font-weight:550;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.wf-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;font-size:12px;color:var(--muted)}
.wf-sub code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;
  background:color-mix(in srgb,var(--ink) 6%,transparent);padding:1px 5px;border-radius:5px;color:var(--ink2)}
.lastok{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px}
.lastok b{color:var(--ink2);font-weight:550}

/* status pill */
.pill{
  display:inline-flex;align-items:center;gap:5px;flex:none;
  padding:2.5px 9px 2.5px 7px;border-radius:999px;font-size:11.5px;font-weight:600;
  border:1px solid transparent;white-space:nowrap;
}
.pill svg{width:12px;height:12px;flex:none}
.pill.good{color:var(--good);background:color-mix(in srgb,var(--good) 12%,transparent);border-color:color-mix(in srgb,var(--good) 28%,transparent)}
.pill.crit{color:var(--crit);background:color-mix(in srgb,var(--crit) 12%,transparent);border-color:color-mix(in srgb,var(--crit) 30%,transparent)}
.pill.warn{color:color-mix(in srgb,var(--warn) 78%,var(--ink));background:color-mix(in srgb,var(--warn) 16%,transparent);border-color:color-mix(in srgb,var(--warn) 38%,transparent)}
.pill.serious{color:color-mix(in srgb,var(--serious) 82%,var(--ink));background:color-mix(in srgb,var(--serious) 15%,transparent);border-color:color-mix(in srgb,var(--serious) 34%,transparent)}
.pill.run{color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.pill.idle{color:var(--muted);background:color-mix(in srgb,var(--muted) 12%,transparent);border-color:color-mix(in srgb,var(--muted) 26%,transparent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.pill.run svg{animation:spin 1.6s linear infinite}
.live-row{outline:2px solid color-mix(in srgb,var(--accent) 30%,transparent);outline-offset:-1px}

/* ---------- stat tiles ---------- */
.stat{padding:13px 14px}
.stat .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.stat .val{font-size:26px;font-weight:680;letter-spacing:-.02em;margin-top:5px;line-height:1.15}
.stat .val.sm{font-size:19px}
.stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
.stat .delta{font-size:12px;font-weight:600;margin-top:3px}

/* meter */
.meter{height:7px;border-radius:99px;background:color-mix(in srgb,var(--ink) 9%,transparent);overflow:hidden;margin-top:9px}
.meter i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .5s}

/* ---------- charts ---------- */
.chart{padding:13px 14px}
.chart h3{font-size:13.5px;margin-bottom:2px}
.chart .cap{font-size:12px;color:var(--muted);margin-bottom:10px}
svg.plot{display:block;width:100%;overflow:visible;touch-action:pan-y}
.tick{font-size:10.5px;fill:var(--muted)}
.gridline{stroke:var(--grid);stroke-width:1}
.baseline{stroke:var(--axis);stroke-width:1}
.tip{
  position:fixed;z-index:60;pointer-events:none;opacity:0;transition:opacity .1s;
  background:var(--surface);border:1px solid var(--ring);border-radius:9px;
  box-shadow:var(--shadow);padding:7px 10px;font-size:12px;white-space:nowrap;
}
.tip b{font-weight:650}
.tip .k{color:var(--muted)}

/* bar list */
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row .bl{display:flex;align-items:baseline;gap:8px;font-size:12.5px;margin-bottom:4px}
.bar-row .bl .n{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink2)}
.bar-row .bl .v{margin-left:auto;font-weight:620;font-variant-numeric:tabular-nums;flex:none}
.bar-track{height:9px;background:color-mix(in srgb,var(--ink) 6%,transparent);border-radius:99px;overflow:hidden}
.bar-track i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .5s}

/* ---------- resource rows ---------- */
.res{padding:11px 14px;border-top:1px solid var(--grid);display:flex;align-items:center;gap:11px}
.res:first-child{border-top:0}
.res .nm{font-weight:600;font-size:13.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res .sub{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res .spark{flex:none;width:78px}
.res .cpu{flex:none;text-align:right;font-variant-numeric:tabular-nums;font-size:12.5px;min-width:64px}
.res .cpu b{display:block;font-weight:650}
.res .cpu span{font-size:11px;color:var(--muted)}

/* ---------- gate / empty ---------- */
.gate{max-width:520px;margin:6vh auto;padding:26px 24px;text-align:center}
.gate .em{font-size:38px;line-height:1}
.gate h2{font-size:21px;margin:12px 0 7px}
.gate p{color:var(--ink2);font-size:14px;margin:0 0 18px}
.gate .row{display:flex;flex-direction:column;gap:9px}
.gate .fine{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.55}
.linkbtn{background:none;border:0;padding:8px 4px;margin-top:10px;cursor:pointer;
  font-size:12.5px;color:var(--muted);text-decoration:underline;text-underline-offset:3px}
.linkbtn:hover{color:var(--ink2)}
.empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13.5px}
.empty .em{font-size:28px;display:block;margin-bottom:8px}

/* ---------- dialog ---------- */
dialog{
  border:1px solid var(--ring);border-radius:16px;padding:0;background:var(--surface);color:var(--ink);
  max-width:560px;width:calc(100vw - 28px);box-shadow:0 20px 60px rgba(0,0,0,.3);
}
dialog::backdrop{background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
.dlg-h{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid var(--grid)}
.dlg-h h2{font-size:16px}
.dlg-b{padding:16px;max-height:min(62vh,560px);overflow:auto}
.dlg-f{padding:12px 16px;border-top:1px solid var(--grid);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px}
.fld .hint{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.5}
input[type=text],input[type=password],input[type=number],input[type=date],textarea,select{
  width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--ring);
  background:var(--plane);color:var(--ink);font:inherit;font-size:14px;
}
input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
textarea{min-height:74px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
.chk{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;font-size:13.5px}
.chk:hover{background:color-mix(in srgb,var(--ink) 5%,transparent)}
.chk input{width:17px;height:17px;flex:none;accent-color:var(--accent)}
.chk .rn{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chk .rd{font-size:11.5px;color:var(--muted);margin-left:auto;flex:none}
.note{font-size:12.5px;line-height:1.55;padding:10px 12px;border-radius:9px;
  background:color-mix(in srgb,var(--accent) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);color:var(--ink2)}
.note.warnbox{background:color-mix(in srgb,var(--warn) 12%,transparent);border-color:color-mix(in srgb,var(--warn) 32%,transparent)}

/* toast */
#toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,14px);z-index:80;
  background:var(--ink);color:var(--surface);padding:10px 15px;border-radius:11px;font-size:13.5px;
  opacity:0;transition:.22s;pointer-events:none;max-width:min(92vw,440px)}
#toast.on{opacity:1;transform:translate(-50%,0)}
.hidden{display:none!important}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="brand"><span class="dot" id="healthDot"></span><h1>Ops Widget</h1></div>
    <span class="spacer"></span>
    <span class="meta sr" id="lastSync"></span>
    <button class="iconbtn" id="btnTheme" title="Toggle theme" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="iconbtn" id="btnRefresh" title="Refresh now">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
      <span class="lbl-r">Refresh</span>
    </button>
    <button class="iconbtn" id="btnSettings" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 9 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
    </button>
  </div>
</header>

<main class="wrap">
  <!-- connect gate -->
  <section id="gate" class="card gate hidden">
    <div class="em">📡</div>
    <h2>Connect your sources</h2>
    <p>Everything stays in <b>this browser only</b>. No server, no secrets in the page.</p>
    <div class="row">
      <button class="iconbtn primary" id="gateGh" style="height:46px"></button>
      <button class="iconbtn" id="gateAz" style="height:46px">
        <svg viewBox="0 0 23 23" width="16" height="16" aria-hidden="true"><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>
        Continue with Microsoft</button>
    </div>
    <button class="linkbtn hidden" id="gateGhPat">Use a personal access token instead</button>
    <p class="fine" id="gateFine"></p>
  </section>

  <!-- GITHUB -->
  <section class="sec hidden" id="secGh">
    <div class="sec-head">
      <h2>Deployments</h2>
      <span class="pill idle" id="ghSummary">—</span>
      <span class="meta" id="ghMeta"></span>
    </div>
    <div class="grid g-repos" id="repos"></div>
  </section>

  <!-- AZURE -->
  <section class="sec hidden" id="secAz">
    <div class="sec-head">
      <h2>Azure</h2>
      <span class="meta" id="azMeta"></span>
    </div>

    <div class="grid g-stats" style="margin-bottom:12px" id="azStats"></div>

    <div class="grid g-two" style="margin-bottom:12px">
      <div class="card chart">
        <h3>Daily spend</h3>
        <div class="cap" id="trendCap">Month to date</div>
        <svg class="plot" id="trend" height="150" role="img" aria-label="Daily Azure spend"></svg>
      </div>
      <div class="card chart">
        <h3>Top services</h3>
        <div class="cap">Month-to-date cost</div>
        <div class="bars" id="svcBars"></div>
      </div>
    </div>

    <div class="card" id="resCard">
      <div style="padding:12px 14px;border-bottom:1px solid var(--grid);display:flex;align-items:center;gap:8px">
        <h3 style="font-size:13.5px">Container Apps</h3>
        <span class="pill idle" id="caSummary" style="margin-left:auto">—</span>
      </div>
      <div id="resList"></div>
    </div>
  </section>
</main>

<div class="tip" id="tip" role="status"></div>
<div id="toast" role="status" aria-live="polite"></div>

<!-- ================= SETTINGS ================= -->
<dialog id="dlg">
  <div class="dlg-h">
    <h2 id="dlgTitle">Settings</h2>
    <span class="spacer" style="flex:1"></span>
    <button class="iconbtn" id="dlgX" aria-label="Close">✕</button>
  </div>
  <div class="dlg-b" id="dlgBody"></div>
  <div class="dlg-f" id="dlgFoot"></div>
</dialog>

<script type="module">
/* ============================================================================
   Ops Widget — GitHub Actions + Azure, in one static page.
   No backend. No secrets in this file. Tokens live in this browser only.
   ========================================================================== */

/* --- silent-auth iframe guard: must run before anything else --------------- */
if (window.parent !== window && /[?#].*code=|[?#].*error=/.test(location.href)) {
  parent.postMessage({ t: 'gbxops-auth', q: location.search || location.hash }, location.origin);
  throw new Error('silent-auth frame');   // stop the rest of the app in the iframe
}

/* ---------------------------------------------------------------- constants */

/* GitHub sign-in. Both values are PUBLIC — the client_id identifies the app and
   the proxy only ever holds the secret server-side (see /worker).
   GitHub supports neither PKCE nor CORS on its OAuth endpoints, so the
   code->token swap cannot happen in the browser; GH_AUTH_PROXY does that one
   call and nothing else. Leave these blank and the widget falls back to a PAT. */
const GH_CLIENT_ID_DEFAULT  = '';
const GH_AUTH_PROXY_DEFAULT = '';

const AZ_CLIENT_ID = '1b24866a-ca8b-4551-b1ed-647aadb339c5';
/* /common — not /organizations. Azure subscriptions are frequently owned by a
   personal Microsoft account (outlook.com/live.com), and /organizations rejects
   those outright with "You can't sign in here with a personal account". */
const AZ_AUTHORITY = 'https://login.microsoftonline.com/common';
const AZ_SCOPE     = 'https://management.azure.com/user_impersonation offline_access openid profile';
const REDIRECT     = location.origin + location.pathname;
const REFRESH_MS   = 60_000;

const K = {
  gh:'gbxops.gh', repos:'gbxops.repos', az:'gbxops.az', pkce:'gbxops.pkce',
  sub:'gbxops.sub', credit:'gbxops.credit', theme:'gbxops.theme',
  ghcfg:'gbxops.ghcfg', oauth:'gbxops.oauth'
};

/* ------------------------------------------------------------------- store */
const store = {
  get(k, d = null) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
  del(k) { localStorage.removeItem(k); }
};

/* --------------------------------------------------------------- tiny utils */
const $  = s => document.querySelector(s);
const el = (t, c, h) => { const n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; };
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

function toast(msg, ms = 3200) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('on'), ms);
}
function ago(iso) {
  if (!iso) return '—';
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return 'just now';
  const m = s / 60;  if (m < 60) return `${m | 0}m ago`;
  const h = m / 60;  if (h < 24) return `${h | 0}h ago`;
  const d = h / 24;  if (d < 30) return `${d | 0}d ago`;
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function dur(a, b) {
  if (!a || !b) return '';
  const s = Math.max(0, (new Date(b) - new Date(a)) / 1000);
  return s < 60 ? `${s | 0}s` : `${(s / 60) | 0}m ${((s % 60) | 0)}s`;
}
const money = (n, cur = 'USD') => {
  try { return new Intl.NumberFormat(undefined, { style: 'currency', currency: cur, maximumFractionDigits: n < 100 ? 2 : 0 }).format(n); }
  catch { return `${cur} ${n.toFixed(2)}`; }
};

/* icons for status pills */
const ICO = {
  ok:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  x:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  run:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>',
  wait: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 2.4 17a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>',
  dash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>'
};
/* run status -> { cls, icon, label } — icon+label always, never colour alone */
function runState(r) {
  if (!r) return { cls: 'idle', ico: ICO.dash, label: 'No runs' };
  if (r.status === 'in_progress') return { cls: 'run',  ico: ICO.run,  label: 'Deploying' };
  if (r.status === 'queued' || r.status === 'waiting' || r.status === 'requested')
    return { cls: 'run', ico: ICO.wait, label: r.status === 'waiting' ? 'Waiting' : 'Queued' };
  switch (r.conclusion) {
    case 'success':          return { cls: 'good',    ico: ICO.ok,   label: 'Passed' };
    case 'failure':          return { cls: 'crit',    ico: ICO.x,    label: 'Failed' };
    /* serious vs warning sit close in hue (ΔE 13.6) — they must never share an
       icon, or the label is the only thing telling them apart. */
    case 'timed_out':        return { cls: 'serious', ico: ICO.wait, label: 'Timed out' };
    case 'action_required':  return { cls: 'warn',    ico: ICO.warn, label: 'Needs approval' };
    case 'cancelled':        return { cls: 'idle',    ico: ICO.dash, label: 'Cancelled' };
    case 'skipped':          return { cls: 'idle',    ico: ICO.dash, label: 'Skipped' };
    default:                 return { cls: 'idle',    ico: ICO.dash, label: r.conclusion || r.status || 'Unknown' };
  }
}

/* ======================================================= GITHUB ============ */
const GH = {
  /* deployment config, overridable at runtime so anyone can point at their own app */
  cfg() {
    const o = store.get(K.ghcfg, {}) || {};
    return {
      clientId: o.clientId || GH_CLIENT_ID_DEFAULT,
      proxy: (o.proxy || GH_AUTH_PROXY_DEFAULT || '').replace(/\/+$/, '')
    };
  },
  canOAuth()  { const c = GH.cfg(); return !!(c.clientId && c.proxy); },
  connected() { return !!store.get(K.gh); },

  login() {
    const c = GH.cfg();
    if (!GH.canOAuth()) throw new Error('GitHub sign-in is not configured on this deployment.');
    /* state is prefixed so the shared redirect URI can tell GitHub's callback
       apart from Azure's — both come back as ?code= on the same page. */
    const state = 'gh.' + b64url(crypto.getRandomValues(new Uint8Array(12)));
    store.set(K.oauth, { state });
    location.assign('https://github.com/login/oauth/authorize?' + new URLSearchParams({
      client_id: c.clientId, redirect_uri: REDIRECT, state
    }));
  },

  save(j) {
    store.set(K.gh, {
      at: j.access_token,
      rt: j.refresh_token || null,
      /* GitHub Apps may issue expiring user tokens; OAuth Apps/PATs do not */
      exp: j.expires_in ? Date.now() + (j.expires_in - 120) * 1000 : null
    });
  },

  async complete(p) {
    if (p.get('error')) throw new Error(p.get('error_description') || p.get('error'));
    const saved = store.get(K.oauth); store.del(K.oauth);
    if (!saved || p.get('state') !== saved.state) throw new Error('GitHub sign-in state mismatch — try again.');
    const res = await fetch(GH.cfg().proxy + '/exchange', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: p.get('code'), redirect_uri: REDIRECT })
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || j.error || !j.access_token)
      throw new Error(j.error_description || j.error || 'GitHub token exchange failed');
    GH.save(j);
  },

  async accessToken() {
    const t = store.get(K.gh);
    if (!t) throw new Error('GitHub not connected');
    if (typeof t === 'string') return t;              // pasted PAT — never expires
    if (!t.exp || Date.now() < t.exp) return t.at;
    if (!t.rt) { store.del(K.gh); throw new Error('GitHub session expired — sign in again.'); }
    const res = await fetch(GH.cfg().proxy + '/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: t.rt })
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || j.error || !j.access_token) {
      store.del(K.gh); throw new Error('GitHub session expired — sign in again.');
    }
    GH.save(j); return j.access_token;
  },

  async api(path, opts = {}) {
    const at = await GH.accessToken();
    const res = await fetch(`https://api.github.com${path}`, {
      ...opts,
      headers: {
        Accept: 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        Authorization: `Bearer ${at}`,
        ...(opts.headers || {})
      }
    });
    if (res.status === 401) { store.del(K.gh); throw new Error('GitHub authorisation rejected — sign in again.'); }
    if (!res.ok) throw new Error(`GitHub ${res.status}: ${(await res.text()).slice(0, 140)}`);
    return res.json();
  },
  async me()     { return GH.api('/user'); },
  /* A GitHub App user token only sees repos the app is installed on, which
     /user/repos does not report — fall through to the installation list. */
  async myRepos() {
    const direct = await GH.api('/user/repos?per_page=100&sort=pushed&affiliation=owner,organization_member').catch(() => null);
    if (direct?.length) return direct;
    const inst = await GH.api('/user/installations').catch(() => null);
    if (!inst?.installations?.length) return direct || [];
    const lists = await Promise.all(inst.installations.map(i =>
      GH.api(`/user/installations/${i.id}/repositories?per_page=100`)
        .then(d => d.repositories || []).catch(() => [])));
    return lists.flat();
  },
  /* latest run per workflow + the last successful run per workflow */
  async repoRuns(full) {
    const d = await GH.api(`/repos/${full}/actions/runs?per_page=50`);
    const byWf = new Map();
    for (const r of (d.workflow_runs || [])) {
      const key = r.workflow_id ?? r.name;
      if (!byWf.has(key)) byWf.set(key, { name: r.name, latest: r, lastSuccess: null });
      const e = byWf.get(key);
      if (!e.lastSuccess && r.conclusion === 'success') e.lastSuccess = r;
    }
    return [...byWf.values()]
      .sort((a, b) => new Date(b.latest.created_at) - new Date(a.latest.created_at))
      .slice(0, 4);
  }
};

/* ======================================================= AZURE (PKCE) ====== */
const b64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf)))
  .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

async function pkce() {
  const v = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const c = b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)));
  return { v, c };
}

const AZ = {
  tok: () => store.get(K.az),
  connected: () => !!AZ.tok()?.rt,

  async login() {
    const { v, c } = await pkce();
    const state = b64url(crypto.getRandomValues(new Uint8Array(12)));
    store.set(K.pkce, { v, state });
    location.assign(`${AZ_AUTHORITY}/oauth2/v2.0/authorize?` + new URLSearchParams({
      client_id: AZ_CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT,
      scope: AZ_SCOPE, code_challenge: c, code_challenge_method: 'S256',
      state, prompt: 'select_account'
    }));
  },

  async exchange(body) {
    const res = await fetch(`${AZ_AUTHORITY}/oauth2/v2.0/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: AZ_CLIENT_ID, redirect_uri: REDIRECT, ...body })
    });
    const j = await res.json();
    if (!res.ok) throw new Error(j.error_description || j.error || 'Azure token error');
    store.set(K.az, { at: j.access_token, rt: j.refresh_token, exp: Date.now() + (j.expires_in - 90) * 1000 });
    return j.access_token;
  },

  /* handle the ?code= landing */
  async complete(qs) {
    const p = new URLSearchParams(qs.startsWith('#') ? qs.slice(1) : qs);
    if (p.get('error')) throw new Error(p.get('error_description') || p.get('error'));
    const code = p.get('code'); if (!code) return false;
    const saved = store.get(K.pkce);
    if (!saved) throw new Error('Auth state lost — try connecting again.');
    if (p.get('state') && saved.state && p.get('state') !== saved.state) throw new Error('Auth state mismatch.');
    store.del(K.pkce);
    await AZ.exchange({ grant_type: 'authorization_code', code, code_verifier: saved.v });
    return true;
  },

  /* SPA refresh tokens are capped at 24h by Entra, so fall back to a hidden
     prompt=none iframe, which succeeds while the Microsoft session cookie lives. */
  async silent() {
    const { v, c } = await pkce();
    const state = b64url(crypto.getRandomValues(new Uint8Array(12)));
    const url = `${AZ_AUTHORITY}/oauth2/v2.0/authorize?` + new URLSearchParams({
      client_id: AZ_CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT,
      scope: AZ_SCOPE, code_challenge: c, code_challenge_method: 'S256',
      state, prompt: 'none'
    });
    const qs = await new Promise(resolve => {
      const f = el('iframe'); f.style.display = 'none'; f.src = url;
      const done = q => { window.removeEventListener('message', onMsg); f.remove(); clearTimeout(to); resolve(q); };
      const onMsg = e => { if (e.origin === location.origin && e.data?.t === 'gbxops-auth') done(e.data.q); };
      const to = setTimeout(() => done(null), 12_000);
      window.addEventListener('message', onMsg);
      document.body.appendChild(f);
    });
    if (!qs) throw new Error('silent auth timed out');
    const p = new URLSearchParams(qs.startsWith('#') ? qs.slice(1) : qs);
    if (!p.get('code')) throw new Error(p.get('error') || 'silent auth failed');
    return AZ.exchange({ grant_type: 'authorization_code', code: p.get('code'), code_verifier: v });
  },

  async token() {
    const t = AZ.tok();
    if (!t) throw new Error('Azure not connected');
    if (t.at && Date.now() < t.exp) return t.at;
    if (t.rt) {
      try { return await AZ.exchange({ grant_type: 'refresh_token', refresh_token: t.rt, scope: AZ_SCOPE }); }
      catch { /* fall through to silent */ }
    }
    return AZ.silent();   // throws if the Microsoft session is gone -> caller prompts
  },

  async api(url, opts = {}) {
    const at = await AZ.token();
    const res = await fetch(url.startsWith('http') ? url : `https://management.azure.com${url}`, {
      ...opts,
      headers: { Authorization: `Bearer ${at}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    if (!res.ok) {
      let m = `Azure ${res.status}`;
      try { const j = await res.json(); m = j.error?.message || j.message || m; } catch {}
      throw new Error(m);
    }
    return res.status === 204 ? null : res.json();
  },

  subs() { return AZ.api('/subscriptions?api-version=2022-12-01').then(d => d.value || []); },

  /* daily cost, grouped by service — one query serves both the trend and the bars */
  async cost(subId, from, to) {
    const body = from
      ? { type:'ActualCost', timeframe:'Custom', timePeriod:{ from, to },
          dataset:{ granularity:'Daily', aggregation:{ totalCost:{ name:'Cost', function:'Sum' } },
                    grouping:[{ type:'Dimension', name:'ServiceName' }] } }
      : { type:'ActualCost', timeframe:'MonthToDate',
          dataset:{ granularity:'Daily', aggregation:{ totalCost:{ name:'Cost', function:'Sum' } },
                    grouping:[{ type:'Dimension', name:'ServiceName' }] } };
    const d = await AZ.api(
      `/subscriptions/${subId}/providers/Microsoft.CostManagement/query?api-version=2023-03-01`,
      { method:'POST', body: JSON.stringify(body) });

    const cols = (d.properties?.columns || []).map(c => c.name);
    const iC = cols.indexOf('Cost'), iD = cols.indexOf('UsageDate'),
          iS = cols.indexOf('ServiceName'), iX = cols.indexOf('Currency');
    const byDay = new Map(), bySvc = new Map();
    let total = 0, cur = 'USD';
    for (const row of (d.properties?.rows || [])) {
      const c = Number(row[iC]) || 0; total += c;
      if (iX > -1 && row[iX]) cur = row[iX];
      if (iD > -1) { const k = String(row[iD]); byDay.set(k, (byDay.get(k) || 0) + c); }
      if (iS > -1) { const k = row[iS] || 'Other'; bySvc.set(k, (bySvc.get(k) || 0) + c); }
    }
    return {
      total, currency: cur,
      days: [...byDay.entries()].sort((a, b) => a[0].localeCompare(b[0]))
        .map(([d, v]) => ({ d: `${d}`.replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3'), v })),
      svcs: [...bySvc.entries()].sort((a, b) => b[1] - a[1])
    };
  },

  containerApps(subId) {
    return AZ.api(`/subscriptions/${subId}/providers/Microsoft.App/containerApps?api-version=2024-03-01`)
      .then(d => d.value || []);
  },

  /* CPU + memory series for one Container App */
  async metrics(resId) {
    const end = new Date(), start = new Date(Date.now() - 3 * 3600e3);
    const q = new URLSearchParams({
      'api-version': '2018-01-01',
      metricnames: 'UsageNanoCores,WorkingSetBytes',
      timespan: `${start.toISOString()}/${end.toISOString()}`,
      interval: 'PT15M', aggregation: 'Average'
    });
    const d = await AZ.api(`https://management.azure.com${resId}/providers/microsoft.insights/metrics?${q}`);
    const out = {};
    for (const m of (d.value || [])) {
      const pts = (m.timeseries?.[0]?.data || []).map(p => p.average).filter(v => v != null);
      out[m.name.value] = pts;
    }
    return out;
  }
};

/* ======================================================= CHARTS =========== */
const tipEl = $('#tip');
const showTip = (x, y, html) => {
  tipEl.innerHTML = html; tipEl.style.opacity = '1';
  const r = tipEl.getBoundingClientRect();
  tipEl.style.left = Math.min(Math.max(8, x - r.width / 2), innerWidth - r.width - 8) + 'px';
  tipEl.style.top  = Math.max(8, y - r.height - 12) + 'px';
};
const hideTip = () => { tipEl.style.opacity = '0'; };

/* area + line, single series, sequential blue. crosshair tooltip by default. */
function drawTrend(svg, days, cur) {
  svg.innerHTML = '';
  if (!days.length) { svg.innerHTML = `<text x="8" y="24" class="tick">No cost data yet</text>`; return; }
  const W = svg.clientWidth || 460, H = 150;
  const P = { t: 10, r: 8, b: 20, l: 42 };
  const iw = Math.max(10, W - P.l - P.r), ih = H - P.t - P.b;
  const max = Math.max(...days.map(d => d.v), 0.01);
  const X = i => P.l + (days.length === 1 ? iw / 2 : (i / (days.length - 1)) * iw);
  const Y = v => P.t + ih - (v / max) * ih;
  const NS = 'http://www.w3.org/2000/svg';
  const add = (t, a) => { const n = document.createElementNS(NS, t); for (const k in a) n.setAttribute(k, a[k]); svg.appendChild(n); return n; };

  /* recessive grid + axis ticks */
  for (let g = 0; g <= 2; g++) {
    const v = (max / 2) * g, y = Y(v);
    add('line', { x1: P.l, x2: W - P.r, y1: y, y2: y, class: 'gridline' });
    const t = add('text', { x: P.l - 7, y: y + 3.5, class: 'tick', 'text-anchor': 'end' });
    t.textContent = money(v, cur).replace(/\.00$/, '');
  }
  add('line', { x1: P.l, x2: W - P.r, y1: P.t + ih, y2: P.t + ih, class: 'baseline' });

  const line = days.map((d, i) => `${i ? 'L' : 'M'}${X(i)},${Y(d.v)}`).join(' ');
  const grad = document.createElementNS(NS, 'linearGradient');
  grad.setAttribute('id', 'gTrend'); grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
  grad.setAttribute('x2', '0'); grad.setAttribute('y2', '1');
  grad.innerHTML = `<stop offset="0" stop-color="var(--accent)" stop-opacity=".26"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/>`;
  svg.appendChild(grad);
  add('path', { d: `${line} L${X(days.length - 1)},${P.t + ih} L${X(0)},${P.t + ih} Z`, fill: 'url(#gTrend)' });
  add('path', { d: line, fill: 'none', stroke: 'var(--accent)', 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' });

  /* first / last date ticks only — no label on every point */
  const dl = (i, anchor) => {
    const t = add('text', { x: X(i), y: H - 5, class: 'tick', 'text-anchor': anchor });
    t.textContent = new Date(days[i].d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  };
  dl(0, 'start'); if (days.length > 1) dl(days.length - 1, 'end');

  /* hover layer */
  const cross = add('line', { y1: P.t, y2: P.t + ih, class: 'gridline', stroke: 'var(--accent)', opacity: 0 });
  const dot = add('circle', { r: 4.5, fill: 'var(--accent)', stroke: 'var(--surface)', 'stroke-width': 2, opacity: 0 });
  const hit = add('rect', { x: 0, y: 0, width: W, height: H, fill: 'transparent', style: 'cursor:crosshair' });
  const move = ev => {
    const r = svg.getBoundingClientRect();
    const px = (ev.touches?.[0]?.clientX ?? ev.clientX) - r.left;
    let i = Math.round(((px - P.l) / iw) * (days.length - 1));
    i = Math.max(0, Math.min(days.length - 1, i));
    const d = days[i];
    cross.setAttribute('x1', X(i)); cross.setAttribute('x2', X(i)); cross.setAttribute('opacity', .5);
    dot.setAttribute('cx', X(i)); dot.setAttribute('cy', Y(d.v)); dot.setAttribute('opacity', 1);
    showTip(r.left + X(i), r.top + Y(d.v),
      `<b>${money(d.v, cur)}</b><br><span class="k">${new Date(d.d).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</span>`);
  };
  const out = () => { cross.setAttribute('opacity', 0); dot.setAttribute('opacity', 0); hideTip(); };
  hit.addEventListener('mousemove', move); hit.addEventListener('mouseleave', out);
  hit.addEventListener('touchstart', move, { passive: true });
  hit.addEventListener('touchmove', move, { passive: true });
  hit.addEventListener('touchend', out);
}

/* tiny sparkline (single series, no axes) */
function spark(pts, w = 78, h = 24) {
  if (!pts?.length) return `<svg width="${w}" height="${h}"></svg>`;
  const max = Math.max(...pts, 1e-9), min = Math.min(...pts);
  const rng = (max - min) || max || 1;
  const d = pts.map((v, i) => `${i ? 'L' : 'M'}${(i / Math.max(1, pts.length - 1)) * w},${h - ((v - min) / rng) * (h - 4) - 2}`).join(' ');
  return `<svg width="${w}" height="${h}" aria-hidden="true"><path d="${d}" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/></svg>`;
}

let TICK = null;

function setHealth(state) {

  const d = $('#healthDot');

}

async function renderGitHub() {
  const sec = $('#secGh'), host = $('#repos');
  if (!GH.connected()) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');

  const repos = store.get(K.repos, []);
  if (!repos.length) {
    host.innerHTML = `<div class="card empty" style="grid-column:1/-1"><span class="em">📂</span>
      No repos selected yet.<br><button class="iconbtn" style="margin-top:12px" onclick="window.__openSettings('repos')">Choose repos</button></div>`;
    $('#ghSummary').className = 'pill idle'; $('#ghSummary').textContent = '—';
    return;
  }

  host.innerHTML = repos.map(r =>
    `<div class="card repo" data-r="${esc(r)}"><div class="repo-h">
       <span class="nm"><span class="own">${esc(r.split('/')[0])}/</span>${esc(r.split('/')[1] || '')}</span>
     </div><div class="empty" style="padding:14px 0;text-align:left">Loading…</div></div>`).join('');

  const results = await Promise.allSettled(repos.map(r => GH.repoRuns(r)));
  let running = 0, failed = 0, ok = 0;

  results.forEach((res, i) => {
    const full = repos[i];
    const card = host.querySelector(`[data-r="${CSS.escape(full)}"]`);
    if (!card) return;
    const body = card.querySelector('.empty') || card.lastElementChild;

    if (res.status === 'rejected') {
      body.outerHTML = `<div class="wf"><div class="wf-sub" style="color:var(--crit)">${esc(res.reason.message)}</div></div>`;
      return;
    }
    const wfs = res.value;
    if (!wfs.length) { body.outerHTML = `<div class="wf"><div class="wf-sub">No workflow runs</div></div>`; return; }

    body.outerHTML = wfs.map(w => {
      const s = runState(w.latest);
      if (s.cls === 'run') running++; else if (s.cls === 'crit') failed++; else if (s.cls === 'good') ok++;
      const r = w.latest;
      const sameRun = w.lastSuccess && w.lastSuccess.id === r.id;
      return `<div class="wf ${s.cls === 'run' ? 'live-row' : ''}">
        <div class="wf-top">
          <span class="wf-nm">${esc(w.name)}</span>
          <span class="pill ${s.cls}">${s.ico}${esc(s.label)}</span>
        </div>
        <div class="wf-sub">
          <code>${esc(r.head_branch || '—')}</code>
          <span>·</span><span>${esc(r.actor?.login || '')}</span>
          <span>·</span><span>${ago(r.created_at)}</span>
          ${r.run_started_at && r.updated_at && s.cls !== 'run' ? `<span>·</span><span>${dur(r.run_started_at, r.updated_at)}</span>` : ''}
          <a href="${esc(r.html_url)}" target="_blank" rel="noopener" style="margin-left:auto;font-size:11.5px">open ↗</a>
        </div>
        ${sameRun
          ? `<div class="lastok">Last success is the current run</div>`
          : w.lastSuccess
            ? `<div class="lastok">Last success <b>${ago(w.lastSuccess.created_at)}</b> on <code>${esc(w.lastSuccess.head_branch || '—')}</code>
                 <a href="${esc(w.lastSuccess.html_url)}" target="_blank" rel="noopener">↗</a></div>`
            : `<div class="lastok" style="color:var(--serious)">No successful run in the last 50</div>`}
      </div>`;
    }).join('');
  });

  const sum = $('#ghSummary');
  if (running)      { sum.className = 'pill run';  sum.innerHTML = `${ICO.run}${running} deploying`; setHealth('run'); }
  else if (failed)  { sum.className = 'pill crit'; sum.innerHTML = `${ICO.x}${failed} failing`;      setHealth('crit'); }
  else              { sum.className = 'pill good'; sum.innerHTML = `${ICO.ok}All green`;             setHealth('good'); }
  $('#ghMeta').textContent = `${repos.length} repo${repos.length > 1 ? 's' : ''} · updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
}

async function renderAzure() {
  const sec = $('#secAz');
  if (!AZ.connected()) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');

  let subId = store.get(K.sub);
  try {
    if (!subId) {
      const subs = await AZ.subs();
      if (!subs.length) throw new Error('No Azure subscriptions visible to this account.');
      subId = subs[0].subscriptionId; store.set(K.sub, subId);
    }
  } catch (e) {
    $('#azMeta').innerHTML = `<span style="color:var(--crit)">${esc(e.message)}</span>`;
    return;
  }

  const credit = store.get(K.credit, null);   // { amount, start }
  const stats = $('#azStats');
  stats.innerHTML = `<div class="card stat"><div class="lbl">Loading</div><div class="val sm">…</div></div>`;

  /* cost: MTD always; plus grant-to-date when a credit is configured */
  const jobs = [ AZ.cost(subId).catch(e => ({ err: e.message })) ];
  if (credit?.amount && credit?.start) {
    jobs.push(AZ.cost(subId, credit.start, new Date().toISOString().slice(0, 10)).catch(e => ({ err: e.message })));
  }
  const [mtd, grant] = await Promise.all(jobs);

  if (mtd.err) {
    stats.innerHTML = `<div class="card stat" style="grid-column:1/-1"><div class="lbl">Cost unavailable</div>
      <div class="val sm" style="color:var(--crit)">${esc(mtd.err)}</div>
      <div class="sub">Cost Management needs <b>Cost Management Reader</b> (or Reader) on the subscription.</div></div>`;
  } else {
    const days = mtd.days, cur = mtd.currency;
    const today = days.at(-1)?.v ?? 0;
    const avg = days.length ? mtd.total / days.length : 0;
    const dim = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
    const proj = avg * dim;

    const tiles = [
      `<div class="card stat"><div class="lbl">Month to date</div>
         <div class="val">${money(mtd.total, cur)}</div>
         <div class="sub">${days.length} day${days.length > 1 ? 's' : ''} billed</div></div>`,
      `<div class="card stat"><div class="lbl">Yesterday</div>
         <div class="val sm">${money(today, cur)}</div>
         <div class="delta" style="color:${today > avg ? 'var(--serious)' : 'var(--good)'}">
           ${today > avg ? '▲' : '▼'} ${avg ? Math.abs(((today - avg) / avg) * 100).toFixed(0) : 0}% vs avg</div></div>`,
      `<div class="card stat"><div class="lbl">Projected month</div>
         <div class="val sm">${money(proj, cur)}</div>
         <div class="sub">at ${money(avg, cur)}/day</div></div>`
    ];

    if (credit?.amount) {
      const spent = grant && !grant.err ? grant.total : mtd.total;
      const left = Math.max(0, credit.amount - spent);
      const pct = Math.min(100, (spent / credit.amount) * 100);
      const bar = pct > 90 ? 'var(--crit)' : pct > 75 ? 'var(--serious)' : 'var(--good)';
      tiles.push(`<div class="card stat"><div class="lbl">Credit remaining</div>
        <div class="val sm">${money(left, cur)}</div>
        <div class="sub">${pct.toFixed(0)}% of ${money(credit.amount, cur)} used${grant?.err ? ' · MTD only' : ''}</div>
        <div class="meter"><i style="width:${pct}%;background:${bar}"></i></div></div>`);
    } else {
      tiles.push(`<div class="card stat"><div class="lbl">Credit remaining</div>
        <div class="val sm" style="color:var(--muted)">Not set</div>
        <div class="sub">Azure exposes no balance API — <a href="#" onclick="window.__openSettings('azure');return false">enter your grant</a> to track it.</div></div>`);
    }
    stats.innerHTML = tiles.join('');

    drawTrend($('#trend'), days, cur);
    $('#trendCap').textContent = `Month to date · ${money(mtd.total, cur)} total`;

    /* top services — one hue, ranked, direct-labelled (colour must not encode rank) */
    const top = mtd.svcs.slice(0, 6);
    const other = mtd.svcs.slice(6).reduce((a, [, v]) => a + v, 0);
    const rows = other > 0.005 ? [...top, ['Other services', other]] : top;
    const mx = Math.max(...rows.map(r => r[1]), 1e-9);
    $('#svcBars').innerHTML = rows.length
      ? rows.map(([n, v]) => `<div class="bar-row">
          <div class="bl"><span class="n">${esc(n)}</span><span class="v">${money(v, cur)}</span></div>
          <div class="bar-track"><i style="width:${Math.max(2, (v / mx) * 100)}%"></i></div></div>`).join('')
      : `<div class="empty" style="padding:16px 0">No service costs yet</div>`;
  }

  /* ---- Container Apps + live metrics ---- */
  const list = $('#resList');
  try {
    const apps = await AZ.containerApps(subId);
    if (!apps.length) {
      list.innerHTML = `<div class="empty"><span class="em">📦</span>No Container Apps in this subscription</div>`;
      $('#caSummary').className = 'pill idle'; $('#caSummary').textContent = 'None';
    } else {
      let up = 0;
      list.innerHTML = apps.map(a => {
        const ps = a.properties?.provisioningState || '';
        const rs = a.properties?.runningStatus || ps;
        const good = /succeeded/i.test(ps) && !/fail|stop/i.test(rs);
        if (good) up++;
        const cls = good ? 'good' : /progress|activat/i.test(rs) ? 'run' : 'crit';
        const ico = good ? ICO.ok : /progress|activat/i.test(rs) ? ICO.run : ICO.x;
        const rev = a.properties?.latestRevisionName || '';
        const fqdn = a.properties?.configuration?.ingress?.fqdn;
        return `<div class="res" data-id="${esc(a.id)}">
          <div style="min-width:0;flex:1">
            <div class="nm">${esc(a.name)}</div>
            <div class="sub">${esc(a.location || '')}${rev ? ' · ' + esc(rev) : ''}${fqdn ? ' · ' + esc(fqdn) : ''}</div>
          </div>
          <span class="spark" data-spark></span>
          <span class="cpu" data-cpu><b>—</b><span>cpu</span></span>
          <span class="pill ${cls}">${ico}${esc(rs || ps || 'Unknown')}</span>
        </div>`;
      }).join('');

      const s = $('#caSummary');
      s.className = up === apps.length ? 'pill good' : up ? 'pill warn' : 'pill crit';
      s.innerHTML = `${up === apps.length ? ICO.ok : ICO.warn}${up}/${apps.length} healthy`;

      /* metrics are best-effort and never block the status list */
      apps.slice(0, 12).forEach(async a => {
        try {
          const m = await AZ.metrics(a.id);
          const row = list.querySelector(`[data-id="${CSS.escape(a.id)}"]`);
          if (!row) return;
          const nano = m.UsageNanoCores || [];
          if (nano.length) {
            row.querySelector('[data-spark]').innerHTML = spark(nano);
            const cores = nano.at(-1) / 1e9;
            const mem = (m.WorkingSetBytes || []).at(-1);
            row.querySelector('[data-cpu]').innerHTML =
              `<b>${cores < 0.01 ? cores.toFixed(3) : cores.toFixed(2)}</b><span>${mem ? (mem / 1048576).toFixed(0) + ' MB' : 'cores'}</span>`;
          }
        } catch { /* metrics off / no perms — leave the dash */ }
      });
    }
  } catch (e) {
    list.innerHTML = `<div class="empty" style="color:var(--crit)">${esc(e.message)}</div>`;
  }

  $('#azMeta').textContent = `sub ${subId.slice(0, 8)}… · updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
}

async function refreshAll(manual) {
  const b = $('#btnRefresh'), svg = b.querySelector('svg');
  b.disabled = true; svg.classList.add('spinning');
  try {
    const jobs = [];
    if (GH.connected()) jobs.push(renderGitHub().catch(e => toast(e.message)));
    if (AZ.connected()) jobs.push(renderAzure().catch(e => {
      if (/not connected|silent|AADSTS/i.test(e.message)) {
        toast('Azure session expired — reconnect from Settings.');
      } else toast(e.message);
    }));
    if (!jobs.length) { $('#gate').classList.remove('hidden'); setHealth('idle'); return; }
    $('#gate').classList.add('hidden');
    await Promise.all(jobs);
    if (manual) toast('Refreshed');
  } finally {
    b.disabled = false; svg.classList.remove('spinning');
  }
}

/* ======================================================= SETTINGS UI ====== */
const dlg = $('#dlg');
let repoCache = null;

async function openSettings(tab = 'main') {
  const body = $('#dlgBody'), foot = $('#dlgFoot');
  $('#dlgTitle').textContent = { main: 'Settings', repos: 'Choose repositories', azure: 'Azure',
    github: 'Connect GitHub', ghapp: 'Your own GitHub App' }[tab] || 'Settings';
  body.innerHTML = ''; foot.innerHTML = '';
  if (!dlg.open) dlg.showModal();

  /* ---------- GitHub token ---------- */
  if (tab === 'github') {
    body.innerHTML = `
      ${GH.canOAuth() ? `<div class="note" style="margin-bottom:15px">You don't need this —
        <a href="#" id="useOauth">sign in with GitHub</a> instead and skip creating a token.
        A token is only worth pasting if you want to scope access more tightly than the App does.</div>` : ''}
      <div class="fld">
        <label for="pat">GitHub personal access token</label>
        <div class="hint">Needs <b>repo</b> scope (private repos) or just <b>public_repo</b>. A fine-grained token works too — give it <b>Actions: read-only</b> + <b>Metadata: read-only</b>.
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Ops%20Widget" target="_blank" rel="noopener">Create one ↗</a></div>
        <input type="password" id="pat" placeholder="ghp_… or github_pat_…" autocomplete="off" spellcheck="false">
      </div>
      <div class="note">Stored only in this browser's localStorage. It is never sent anywhere except <code>api.github.com</code>. Use <b>Sign out</b> to erase it.</div>`;
    foot.innerHTML = `<button class="iconbtn" data-close>Cancel</button><button class="iconbtn primary" id="saveGh">Connect</button>`;
    $('#useOauth') && ($('#useOauth').onclick = e => { e.preventDefault(); GH.login(); });
    $('#saveGh').onclick = async () => {
      const v = $('#pat').value.trim();
      if (!v) return toast('Paste a token first');
      store.set(K.gh, v);
      try {
        const me = await GH.me();
        toast(`Connected as ${me.login}`);
        repoCache = null;
        openSettings('repos');
      } catch (e) { store.del(K.gh); toast(e.message); }
    };
    return;
  }

  /* ---------- point at a self-hosted GitHub App + worker ---------- */
  if (tab === 'ghapp') {
    const c = store.get(K.ghcfg, {}) || {};
    body.innerHTML = `
      <div class="note">Optional. This deployment already ships a GitHub App, so you can ignore this
        unless you'd rather sign in through your own — for example to keep the token exchange entirely
        on infrastructure you control.</div>
      <div class="fld" style="margin-top:15px">
        <label for="gcid">GitHub App client ID</label>
        <div class="hint">From your App's settings page. Public — not a secret.</div>
        <input type="text" id="gcid" placeholder="Iv1.… or Iv23…" value="${esc(c.clientId || '')}" spellcheck="false">
      </div>
      <div class="fld">
        <label for="gpx">Token-exchange endpoint</label>
        <div class="hint">Your deployed worker, e.g. <code>https://ops-widget-auth.you.workers.dev</code>.
          Source is in <code>/worker</code> of this repo.</div>
        <input type="text" id="gpx" placeholder="https://…" value="${esc(c.proxy || '')}" spellcheck="false">
      </div>
      <div class="note warnbox">Your App's <b>callback URL</b> must be exactly <code>${esc(REDIRECT)}</code>,
        and the worker must allow this page's origin.</div>`;
    foot.innerHTML = `<button class="iconbtn" id="ghappClear" style="margin-right:auto">Reset to default</button>
      <button class="iconbtn" data-close>Cancel</button><button class="iconbtn primary" id="ghappSave">Save</button>`;
    $('#ghappClear').onclick = () => { store.del(K.ghcfg); paintGate(); openSettings('main'); };
    $('#ghappSave').onclick = () => {
      const clientId = $('#gcid').value.trim(), proxy = $('#gpx').value.trim();
      if (clientId && proxy) store.set(K.ghcfg, { clientId, proxy }); else store.del(K.ghcfg);
      paintGate(); openSettings('main');
    };
    return;
  }

  /* ---------- repo picker ---------- */
  if (tab === 'repos') {
    body.innerHTML = `<div class="fld"><input type="text" id="rq" placeholder="Filter repositories…" autocomplete="off"></div>
      <div id="rlist"><div class="empty">Loading your repositories…</div></div>`;
    foot.innerHTML = `<button class="iconbtn" data-close>Cancel</button><button class="iconbtn primary" id="saveRepos">Save</button>`;

    try { repoCache ||= await GH.myRepos(); }
    catch (e) { $('#rlist').innerHTML = `<div class="empty" style="color:var(--crit)">${esc(e.message)}</div>`; return; }

    const chosen = new Set(store.get(K.repos, []));
    const paint = (q = '') => {
      const rows = repoCache
        .filter(r => r.full_name.toLowerCase().includes(q.toLowerCase()))
        .slice(0, 200);
      $('#rlist').innerHTML = rows.length ? rows.map(r => `
        <label class="chk"><input type="checkbox" value="${esc(r.full_name)}" ${chosen.has(r.full_name) ? 'checked' : ''}>
          <span class="rn">${esc(r.full_name)}</span>
          <span class="rd">${r.private ? 'private' : 'public'} · ${ago(r.pushed_at)}</span></label>`).join('')
        : `<div class="empty">No match</div>`;
      $('#rlist').querySelectorAll('input').forEach(i =>
        i.onchange = () => i.checked ? chosen.add(i.value) : chosen.delete(i.value));
    };
    paint();
    $('#rq').oninput = e => paint(e.target.value);
    $('#saveRepos').onclick = () => { store.set(K.repos, [...chosen]); dlg.close(); refreshAll(true); };
    return;
  }

  /* ---------- azure ---------- */
  if (tab === 'azure') {
    const c = store.get(K.credit, { amount: '', start: '' });
    let subOpts = '<option>Loading…</option>';
    body.innerHTML = `
      <div class="fld"><label for="subSel">Subscription</label><select id="subSel">${subOpts}</select></div>
      <div class="fld">
        <label for="cAmt">Credit / grant total</label>
        <div class="hint">Azure has <b>no public API for sponsorship or credit balance</b> — only spend. Enter your grant here and the widget subtracts actual spend since the start date to show what's left.</div>
        <input type="number" id="cAmt" placeholder="e.g. 5000" step="any" value="${esc(c.amount || '')}">
      </div>
      <div class="fld"><label for="cStart">Grant start date</label>
        <input type="date" id="cStart" value="${esc(c.start || '')}"></div>
      <div class="note warnbox">Cost queries need <b>Cost Management Reader</b> (or Reader) on the subscription. Metrics need <b>Monitoring Reader</b>. Without them those panels show an error but the rest still works.</div>`;
    foot.innerHTML = `<button class="iconbtn" data-close>Cancel</button><button class="iconbtn primary" id="saveAz">Save</button>`;

    try {
      const subs = await AZ.subs();
      const cur = store.get(K.sub);
      $('#subSel').innerHTML = subs.map(s =>
        `<option value="${esc(s.subscriptionId)}" ${s.subscriptionId === cur ? 'selected' : ''}>${esc(s.displayName)}</option>`).join('');
    } catch (e) { $('#subSel').innerHTML = `<option>${esc(e.message)}</option>`; }

    $('#saveAz').onclick = () => {
      store.set(K.sub, $('#subSel').value);
      const amt = parseFloat($('#cAmt').value);
      if (amt > 0) store.set(K.credit, { amount: amt, start: $('#cStart').value || null });
      else store.del(K.credit);
      dlg.close(); refreshAll(true);
    };
    return;
  }

  /* ---------- main ---------- */
  const ghOn = GH.connected(), azOn = AZ.connected();
  const nRepos = store.get(K.repos, []).length;
  body.innerHTML = `
    <div class="fld">
      <label>GitHub</label>
      <div class="hint">${ghOn ? `Connected · <b>${nRepos}</b> repo${nRepos === 1 ? '' : 's'} watched` : 'Not connected'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="iconbtn" id="mGh">${ghOn ? 'Reconnect' : (GH.canOAuth() ? 'Sign in with GitHub' : 'Connect GitHub')}</button>
        ${ghOn ? `<button class="iconbtn" id="mRepos">Choose repos</button>` : ''}
      </div>
      <button class="linkbtn" id="mGhApp">Advanced — use your own GitHub App</button>
    </div>
    <div class="fld">
      <label>Azure</label>
      <div class="hint">${azOn ? 'Signed in with Microsoft' : 'Not connected'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="iconbtn" id="mAz">${azOn ? 'Reconnect' : 'Connect Azure'}</button>
        ${azOn ? `<button class="iconbtn" id="mAzCfg">Subscription &amp; credit</button>` : ''}
      </div>
    </div>
    <div class="note">This page has no backend and ships no secrets. Tokens live in <b>your</b> browser's localStorage and are sent only to <code>api.github.com</code> and <code>management.azure.com</code>. Anyone you share the link with connects their own accounts.</div>`;
  foot.innerHTML = `<button class="iconbtn" id="signout" style="margin-right:auto;color:var(--crit)">Sign out of everything</button>
                    <button class="iconbtn primary" data-close>Done</button>`;

  $('#mGh').onclick = () => { if (GH.canOAuth()) GH.login(); else openSettings('github'); };
  $('#mGhApp').onclick = () => openSettings('ghapp');
  $('#mRepos') && ($('#mRepos').onclick = () => openSettings('repos'));
  $('#mAz').onclick = () => AZ.login();
  $('#mAzCfg') && ($('#mAzCfg').onclick = () => openSettings('azure'));
  $('#signout').onclick = () => {
    if (!confirm('Erase the GitHub token, the Azure session and all settings from this browser?')) return;
    /* theme and the self-hosted-app pointer are settings, not credentials */
    Object.values(K).forEach(k => { if (k !== K.theme && k !== K.ghcfg) store.del(k); });
    dlg.close(); location.reload();
  };
}
window.__openSettings = openSettings;

dlg.addEventListener('click', e => { if (e.target.matches('[data-close]') || e.target === dlg) dlg.close(); });
$('#dlgX').onclick = () => dlg.close();

(function theme() {
  const saved = store.get(K.theme);
  if (saved) document.documentElement.dataset.theme = saved;
  $('#btnTheme').onclick = () => {
    const dark = matchMedia('(prefers-color-scheme:dark)').matches;

function paintGate() {
  const oauth = GH.canOAuth();
  $('#gateGh').innerHTML = GH_MARK + (oauth ? 'Sign in with GitHub' : 'Connect GitHub');
  $('#gateGhPat').classList.toggle('hidden', !oauth);
  $('#gateFine').innerHTML = oauth
    ? 'One click each — no tokens to create. Whatever you connect is stored in <b>your</b> browser only, never on a server.'

}

addEventListener('resize', () => {
  clearTimeout(window._rz);
  window._rz = setTimeout(() => { if (AZ.connected()) renderAzure().catch(() => {}); }, 250);

/* pause polling when the tab is hidden — mobile battery + rate limits */
function startTick() { clearInterval(TICK); TICK = setInterval(() => { if (!document.hidden) refreshAll(false); }, REFRESH_MS); }
document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshAll(false); });

(async function boot() {
  /* Both providers come back to this same redirect URI as ?code=, so route on
     the state prefix rather than guessing. */
  const qs = location.search || location.hash;
  if (/(\?|#|&)(code|error)=/.test(qs)) {
    const p = new URLSearchParams(qs.replace(/^[?#]/, ''));
    try {
      if ((p.get('state') || '').startsWith('gh.')) { await GH.complete(p); toast('GitHub connected'); }
      else { await AZ.complete(qs); toast('Azure connected'); }
    } catch (e) { toast(e.message, 6000); }
    history.replaceState({}, '', REDIRECT);
  }
  paintGate();
  if (!GH.connected() && !AZ.connected()) { $('#gate').classList.remove('hidden'); setHealth('idle'); }
  await refreshAll(false);
  startTick();
})();
